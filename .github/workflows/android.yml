name: Build Android APK

# Builds the Android app in the cloud — no Android Studio needed on your machine.
# On every push to the default branch (or a manual run) it produces an installable
# APK and publishes it to the "android-latest" release, which the landing page's
# Download button points at.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Static export (output: 'export') into ./out. Needs the public Supabase
      # vars at build time, so set them as repo secrets (Settings → Secrets).
      - name: Build web export
        run: npm run build:cap
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor (copies ./out into the native project)
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk king-within.apk

      # Also downloadable straight from the Actions run (Artifacts section).
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: king-within-apk
          path: king-within.apk

      # Publishes/updates a stable release so the landing page can link to
      # /releases/latest/download/king-within.apk
      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: King Within — Android
          files: king-within.apk
          make_latest: true
